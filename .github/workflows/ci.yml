name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall -q .

      - name: Smoke check imports
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "config.settings",
              "core.browser",
              "core.screenshot",
              "integrations.azure_openai",
              "integrations.slack_notifier",
          ]

          for name in modules:
              importlib.import_module(name)
              print(f"OK: {name}")
          PY
