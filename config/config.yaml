# MySuni 자동 테스트 설정 파일 (확장 버전)


azure:
  openai:
    # endpoint: "https://ai-core-openai-llm.openai.azure.com/"
    # endpoint: "https://mysuni-openai-swedencentral.openai.azure.com/"  # Sweden Central (비활성)
    endpoint: "https://mysuni-openai-eastus.openai.azure.com"             # East US (활성)
    api_key: ""                                     # .env 파일의 AZURE_OPENAI_KEY 사용 권장
    api_version: "2024-05-01-preview"
    vision_deployment: "mysuni-openai-gpt4o"        # 스크린샷 판별 모델
    # embedding_deployment: "text-embedding-3-large"

slack:
  bot_token: ""               # .env 파일의 SLACK_BOT_TOKEN 사용 권장
  channel_id: "C09QPQP4PKK"              # Slack 채널 ID (예: C12345678) - 최우선
  channel_name: "#mysuni-qa-noti"            # Slack 채널명 (예: #career-qa-noti)
  dm_user_id: ""              # Slack 사용자 ID (예: U12345678)
  dm_email: "myapplesmj@gmail.com"    # Slack 이메일 주소 (dm_user_id가 없을 때 사용)
  send_dm_also: true          # true면 채널 전송과 함께 DM도 동시 전송
  retry_attempts: 3
  retry_delay: 2

mysuni:
  base_url: "https://mysuni.sk.com/"        # 로그인용
  career_url: "https://career.mysuni.sk.com/"  # 점검 시나리오용

browser:
  headless: false  # 로컬 실행 시 false, Docker/서버 환경에서는 true로 변경 필요
  viewport:
    width: 1280
    height: 1024
  timeout: 30000
  download_dir: "/tmp/downloads"  # ZCP 환경의 임시 디렉토리

test:
  # 테스트할 페이지 URL 매핑
  pages:
    career_profile: "/profile"
    career_recommend: "/career/recommend"
    career_mypick: "/career/my-pick"
    career_coach_1on1: "/coach/one-on-one"
    career_coach_myprogress: "/coach/progress-review"
    career_mti_internalview: "/mti/internal"
    career_mti_goalsetting: "/mti/goal-setting/goal-state"
  # 테스트 시나리오 설정
  scenarios:
    - name: "career_profile"
      enabled: true
      description: "Pilot 1단계: Career Profile 체크리스트"
    - name: "career_recommend"
      enabled: false
      description: "Career Recommend"
      skip_reason: "Pilot 1단계 범위 제외"
    - name: "career_mypick"
      enabled: false
      description: "Career My Pick"
      skip_reason: "Pilot 1단계 범위 제외"
    - name: "career_1on1"
      enabled: false
      description: "Career Coach 1on1"
      skip_reason: "Pilot 1단계 범위 제외"
    - name: "career_myprogress"
      enabled: false
      description: "Career Coach My Progress"
      skip_reason: "Pilot 1단계 범위 제외"

# 민감한 정보는 .env 파일에 저장하세요:
# AZURE_OPENAI_KEY=your_key_here
# SLACK_BOT_TOKEN=xoxb-your-token
# SLACK_CHANNEL_ID=C12345678
# SLACK_CHANNEL_NAME=#mysuni-qa-noti
# SLACK_DM_USER_ID=U12345678
# SLACK_DM_EMAIL=user@company.com
# SLACK_SEND_DM_ALSO=true
# MYSUNI_ID=your_id
# MYSUNI_PWD=your_password
