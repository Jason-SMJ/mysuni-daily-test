apiVersion: v1
kind: Secret
metadata:
  name: career-qa-secrets
  namespace: career-qa
type: Opaque
stringData:
  # Azure OpenAI API Key - Replace with actual value
  azure-openai-key: "YOUR_AZURE_OPENAI_KEY"

  # Slack Bot Token - Replace with actual value
  slack-bot-token: "xoxb-YOUR-SLACK-BOT-TOKEN"

  # Slack Channel ID - Replace with actual value
  slack-channel-id: "C01234567890"

  # Slack DM User ID - Replace with actual value
  slack-dm-user-id: "U01234567890"

  # MySuni Login ID - Replace with actual value
  mysuni-id: "YOUR_MYSUNI_ID"

  # MySuni Login Password - Replace with actual value
  mysuni-pwd: "YOUR_MYSUNI_PWD"

  # Optional: HTTPS Proxy - Remove if not needed
  https-proxy: "http://proxy.sk.com:8080"
