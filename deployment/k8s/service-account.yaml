apiVersion: v1
kind: ServiceAccount
metadata:
  name: career-qa-sa
  namespace: career-qa

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: career-qa-role
  namespace: career-qa
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: career-qa-rolebinding
  namespace: career-qa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: career-qa-role
subjects:
- kind: ServiceAccount
  name: career-qa-sa
  namespace: career-qa
